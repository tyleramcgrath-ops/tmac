<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TMAC Trader — Aggressive Opportunity Engine (Paper)</title>
<style>
  :root{
    --bg:#0b0e14;--surface:#121722;--surface2:#1a2130;--border:#232c3d;
    --text:#e7ecf3;--muted:#93a0b4;--accent:#6366f1;--accentfg:#fff;
    --pos:#2ecc71;--neg:#ff5a52;--warn:#f59e0b;--hot:#ff7a18;
  }
  .light{
    --bg:#f7f8fa;--surface:#fff;--surface2:#f1f3f6;--border:#e3e6eb;
    --text:#11151c;--muted:#5b6471;--accent:#4f46e5;--accentfg:#fff;
    --pos:#0f9d58;--neg:#e0322c;--warn:#d97706;--hot:#ea580c;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  .app{display:grid;grid-template-columns:222px 1fr;min-height:100vh}
  aside{background:var(--surface);border-right:1px solid var(--border);position:sticky;top:0;height:100vh}
  .brand{display:flex;align-items:center;gap:8px;height:56px;padding:0 16px;border-bottom:1px solid var(--border);font-weight:600}
  .brand .dot{width:18px;height:18px;border-radius:5px;background:linear-gradient(135deg,var(--accent),var(--hot))}
  nav{padding:10px}
  nav a{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;color:var(--muted);text-decoration:none;font-size:14px;cursor:pointer;margin-bottom:2px}
  nav a.active{background:var(--accent);color:var(--accentfg)}
  nav a:hover:not(.active){background:var(--surface2)}
  .note{position:absolute;bottom:0;width:222px;padding:12px;border-top:1px solid var(--border);font-size:11px;color:var(--muted)}
  header{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:10px;height:56px;padding:0 18px;background:color-mix(in srgb,var(--surface) 85%,transparent);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);flex-wrap:wrap}
  main{padding:20px}
  .badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:12px;font-weight:600}
  .b-pos{background:color-mix(in srgb,var(--pos) 18%,transparent);color:var(--pos)}
  .b-neg{background:color-mix(in srgb,var(--neg) 18%,transparent);color:var(--neg)}
  .b-warn{background:color-mix(in srgb,var(--warn) 18%,transparent);color:var(--warn)}
  .b-accent{background:color-mix(in srgb,var(--accent) 18%,transparent);color:var(--accent)}
  .b-hot{background:color-mix(in srgb,var(--hot) 20%,transparent);color:var(--hot)}
  .b-default{background:var(--surface2);color:var(--muted)}
  button{font:inherit;border:none;border-radius:9px;padding:8px 12px;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .btn-primary{background:var(--accent);color:var(--accentfg)}
  .btn-secondary{background:var(--surface2);color:var(--text)}
  .btn-danger{background:var(--neg);color:#fff}
  .btn-success{background:var(--pos);color:#fff}
  .btn-hot{background:linear-gradient(135deg,var(--accent),var(--hot));color:#fff}
  .btn-ghost{background:transparent;color:var(--muted)}
  button:disabled{opacity:.5;cursor:not-allowed}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:16px}
  .grid{display:grid;gap:14px}
  .g4{grid-template-columns:repeat(4,1fr)}
  .g3{grid-template-columns:repeat(3,1fr)}
  .g2{grid-template-columns:repeat(2,1fr)}
  .stat .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
  .stat .val{font-size:23px;font-weight:700;margin-top:6px;font-variant-numeric:tabular-nums}
  .stat .sub{font-size:12px;color:var(--muted);margin-top:3px}
  h1{font-size:22px;margin:0 0 4px}
  h3{font-size:14px;margin:0 0 12px}
  .muted{color:var(--muted)}
  .pos{color:var(--pos)}.neg{color:var(--neg)}.hot{color:var(--hot)}
  table{width:100%;border-collapse:collapse;font-size:13px;font-variant-numeric:tabular-nums}
  th{text-align:left;font-size:11px;text-transform:uppercase;color:var(--muted);padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
  td{padding:8px 10px;border-bottom:1px solid var(--border)}
  tr:last-child td{border-bottom:none}
  input,select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:8px 10px;color:var(--text);font:inherit;font-size:14px;outline:none}
  input:focus,select:focus{border-color:var(--accent)}
  label.field{display:block;margin-bottom:10px}
  label.field span{display:block;font-size:11px;color:var(--muted);margin-bottom:4px}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .section{display:none}.section.active{display:block}
  .disc{display:flex;gap:10px;border:1px solid color-mix(in srgb,var(--warn) 40%,transparent);background:color-mix(in srgb,var(--warn) 10%,transparent);border-radius:11px;padding:11px;font-size:13px;color:var(--muted);margin-bottom:18px}
  .empty{padding:30px;text-align:center;color:var(--muted)}
  .switch{position:relative;width:38px;height:20px;border-radius:999px;background:var(--border);cursor:pointer;transition:.15s;flex:none}
  .switch.on{background:var(--accent)}
  .switch .knob{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.15s}
  .switch.on .knob{left:20px}
  .pill{padding:4px 10px;border-radius:9px;font-size:13px;background:var(--surface2);color:var(--muted);cursor:pointer;border:none}
  .pill.active{background:var(--accent);color:var(--accentfg)}
  .meter{height:6px;border-radius:999px;background:var(--surface2);overflow:hidden}
  .meter > i{display:block;height:100%}
  .opp{border:1px solid var(--border);border-radius:12px;padding:13px;background:var(--surface)}
  .kv{display:flex;justify-content:space-between;font-size:12px;padding:2px 0}
  .kv b{font-variant-numeric:tabular-nums}
  @media(max-width:860px){.app{grid-template-columns:1fr}aside{display:none}.g4{grid-template-columns:repeat(2,1fr)}.g3,.g2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <aside>
    <div class="brand"><span class="dot"></span> TMAC Trader</div>
    <nav id="nav"></nav>
    <div class="note">Aggressive paper engine. Not financial advice — no real money, no broker. Live trading disabled.</div>
  </aside>
  <div>
    <header>
      <span id="modeBadge" class="badge b-pos">PAPER MODE</span>
      <span id="aggBadge" class="badge b-default">Standard</span>
      <span id="engineBadge" class="badge b-default">Engine stopped</span>
      <span id="pauseBadge"></span>
      <div class="row" style="margin-left:auto;gap:6px">
        <span id="mkt" class="muted" style="font-size:12px"></span>
        <button id="startBtn" class="btn-hot">▶ Start</button>
        <button id="stopAll" class="btn-danger">■ Stop Trading</button>
        <button id="themeBtn" class="btn-ghost">◐</button>
      </div>
    </header>
    <main>
      <div id="dashboard" class="section active"></div>
      <div id="opportunities" class="section"></div>
      <div id="strategies" class="section"></div>
      <div id="portfolio" class="section"></div>
      <div id="history" class="section"></div>
      <div id="risk" class="section"></div>
      <div id="logs" class="section"></div>
    </main>
  </div>
</div>
<script>
"use strict";
//============================ Universe ============================
const STARTING_EQUITY=100000;
const SYMBOLS=[
  {symbol:"BTC-USD",assetType:"crypto",base:65000},
  {symbol:"ETH-USD",assetType:"crypto",base:3500},
  {symbol:"SOL-USD",assetType:"crypto",base:150},
  {symbol:"DOGE-USD",assetType:"crypto",base:0.15},
  {symbol:"NVDA",assetType:"equity",base:130},
  {symbol:"TSLA",assetType:"equity",base:250},
  {symbol:"AAPL",assetType:"equity",base:220},
  {symbol:"SPY",assetType:"equity",base:560},
];
const SYM=Object.fromEntries(SYMBOLS.map(s=>[s.symbol,s]));
const CRYPTO=SYMBOLS.filter(s=>s.assetType==="crypto").map(s=>s.symbol);
const EQUITY=SYMBOLS.filter(s=>s.assetType==="equity").map(s=>s.symbol);

// Aggressive strategy catalog. assetMode: "long" = buy underlying only;
// "option" = defined-risk options (buy call/put only, never naked sell).
const KINDS={
  momentum_breakout:{name:"Momentum Breakout",assetMode:"long",p:{lookback:20},
    desc:"Buy when price breaks above the recent high with momentum."},
  volume_continuation:{name:"High-Volume Continuation",assetMode:"long",p:{maPeriod:20,volMult:1.5},
    desc:"Buy uptrends confirmed by a surge in volume."},
  rsi_reversal:{name:"RSI Reversal",assetMode:"long",p:{period:14,oversold:32},
    desc:"Buy bounces as RSI turns up out of oversold."},
  ma_trend:{name:"MA Trend Following",assetMode:"long",p:{fast:10,slow:30},
    desc:"Ride trends when fast MA leads slow MA and price is above both."},
  vol_spike:{name:"News / Volatility Spike",assetMode:"long",p:{threshold:2.5},
    desc:"Trade sharp volatility spikes (proxy for news catalysts)."},
  crypto_overnight:{name:"Crypto Overnight Momentum",assetMode:"long",p:{lookback:5,threshold:1.2},
    desc:"Press crypto momentum while equity markets are closed."},
  options_defined:{name:"Defined-Risk Options",assetMode:"option",p:{fast:10,slow:30},
    desc:"Buy calls/puts (defined risk = premium). Never sells naked options."},
};

//============================ State ============================
let state=load()||freshState();
function freshState(){
  const prices={},history={},volumes={};
  for(const s of SYMBOLS){ prices[s.symbol]=s.base; const h=seedHistory(s.base,s.assetType); history[s.symbol]=h.prices; volumes[s.symbol]=h.vols; }
  const st={
    cash:STARTING_EQUITY,equity:STARTING_EQUITY,
    positions:[],trades:[],logs:[],strategies:[],opps:[],
    prices,history,volumes,
    risk:{
      killSwitch:false,liveEnabled:false,aggressive:false,
      perTradePct:0.01, perTradePctAgg:0.03,
      dailyLossPct:0.04, weeklyLossPct:0.08,
      maxPositions:5, maxPositionsAgg:10,
      maxConsecutiveLosses:3, pauseMinutes:30, pausedUntil:0,
      dataFresh:true,
      maxOptionPremiumPct:0.03,
    },
    theme:"dark",
  };
  return st;
}
function seedHistory(base,assetType){
  const vol=assetType==="crypto"?0.03:0.014; let p=base; const prices=[],vols=[];
  for(let i=0;i<140;i++){ p=Math.max(1e-6,p*(1+(Math.random()-0.5)*2*vol+0.0003)); prices.push(p); vols.push(1e6*(0.6+Math.random())); }
  return {prices,vols};
}

//============================ Persistence ============================
let storageOK=true;
function save(){ try{ localStorage.setItem("tmac_agg_v1",JSON.stringify(state)); }catch(e){ storageOK=false; } }
function load(){ try{ const r=localStorage.getItem("tmac_agg_v1"); return r?JSON.parse(r):null; }catch(e){ storageOK=false; return null; } }

//============================ Indicators ============================
function sma(a,p){ if(a.length<p)return NaN; let s=0; for(let i=a.length-p;i<a.length;i++)s+=a[i]; return s/p; }
function rsi(a,p){ if(a.length<p+1)return NaN; let g=0,l=0; for(let i=a.length-p;i<a.length;i++){const d=a[i]-a[i-1];if(d>=0)g+=d;else l-=d;} const ag=g/p,al=l/p; return al===0?100:100-100/(1+ag/al); }
function stdev(a,p){ const sl=a.slice(-p); const m=sl.reduce((x,y)=>x+y,0)/sl.length; return Math.sqrt(sl.reduce((x,y)=>x+(y-m)**2,0)/sl.length); }
function roc(a,p){ if(a.length<p+1)return NaN; const past=a[a.length-1-p]; return past?(a[a.length-1]-past)/past:NaN; }
function volScore(sym){ const h=state.history[sym]; const sd=stdev(h,20); const px=h[h.length-1]; return Math.max(0,Math.min(1,(sd/px)/(SYM[sym].assetType==="crypto"?0.05:0.025))); }

//============================ Signal generation ============================
// Returns {dir:'up'|'down', confidence, reason, stopPct, takePct} or null.
function signal(kind,params,sym){
  const c=state.history[sym], v=state.volumes[sym], price=c[c.length-1];
  const P={...KINDS[kind].p,...params};
  if(kind==="momentum_breakout"){
    const lb=P.lookback; if(c.length<lb+3)return null;
    const prior=c.slice(-lb-1,-1); const hi=Math.max(...prior);
    const mom=roc(c,5);
    if(price>hi&&mom>0){ const strength=(price-hi)/hi; return {dir:"up",confidence:clamp(0.55+strength*25+mom*8),reason:`Broke ${lb}-bar high ${fmt(hi)} with +${(mom*100).toFixed(1)}% 5-bar momentum`,stopPct:0.04,takePct:0.10}; }
  } else if(kind==="volume_continuation"){
    const ma=sma(c,P.maPeriod); const avgVol=v.slice(-P.maPeriod).reduce((a,b)=>a+b,0)/P.maPeriod; const lastVol=v[v.length-1];
    if(price>ma&&lastVol>avgVol*P.volMult&&roc(c,3)>0){ const vr=lastVol/avgVol; return {dir:"up",confidence:clamp(0.5+Math.min(vr-1,1)*0.4),reason:`Uptrend + volume ${vr.toFixed(1)}× average (continuation)`,stopPct:0.045,takePct:0.11}; }
  } else if(kind==="rsi_reversal"){
    const r=rsi(c,P.period),pr=rsi(c.slice(0,-1),P.period); if(isNaN(r)||isNaN(pr))return null;
    if(pr<=P.oversold&&r>pr&&r<50){ return {dir:"up",confidence:clamp(0.5+(P.oversold-Math.min(pr,P.oversold))/100+0.2),reason:`RSI turning up from oversold (${pr.toFixed(0)}→${r.toFixed(0)})`,stopPct:0.035,takePct:0.08}; }
  } else if(kind==="ma_trend"){
    const f=sma(c,P.fast),s=sma(c,P.slow); if(isNaN(f)||isNaN(s))return null;
    if(price>f&&f>s){ return {dir:"up",confidence:clamp(0.5+(f-s)/s*15),reason:`Uptrend: price>MA${P.fast}>MA${P.slow}`,stopPct:0.04,takePct:0.10}; }
    if(price<f&&f<s){ return {dir:"down",confidence:clamp(0.5+(s-f)/s*15),reason:`Downtrend: price<MA${P.fast}<MA${P.slow}`,stopPct:0.04,takePct:0.10}; }
  } else if(kind==="vol_spike"){
    const move=roc(c,2); const sd=stdev(c,20)/price; if(isNaN(move))return null;
    if(Math.abs(move)>P.threshold/100&&Math.abs(move)>sd*1.5){ return {dir:move>0?"up":"down",confidence:clamp(0.5+Math.min(Math.abs(move)*10,0.4)),reason:`Volatility spike ${(move*100).toFixed(1)}% (news proxy)`,stopPct:0.05,takePct:0.12}; }
  } else if(kind==="crypto_overnight"){
    if(SYM[sym].assetType!=="crypto")return null; if(isEquityOpen())return null;
    const m=roc(c,P.lookback); if(isNaN(m))return null;
    if(m>P.threshold/100){ return {dir:"up",confidence:clamp(0.5+Math.min(m*8,0.4)),reason:`Overnight crypto momentum +${(m*100).toFixed(1)}% (equities closed)`,stopPct:0.05,takePct:0.13}; }
  } else if(kind==="options_defined"){
    const f=sma(c,P.fast),s=sma(c,P.slow); if(isNaN(f)||isNaN(s))return null;
    if(f>s&&price>f) return {dir:"up",confidence:clamp(0.55+(f-s)/s*12),reason:`Bullish trend → buy CALL (defined risk = premium)`,stopPct:0.5,takePct:1.0};
    if(f<s&&price<f) return {dir:"down",confidence:clamp(0.55+(s-f)/s*12),reason:`Bearish trend → buy PUT (defined risk = premium)`,stopPct:0.5,takePct:1.0};
  }
  return null;
}
const clamp=x=>Math.max(0.05,Math.min(0.98,x));

//============================ Opportunity scan ============================
// For every enabled strategy × symbol, compute a fully-specified, risk-sized
// trade idea with R/R, scores, entry, stop, take, size and reason.
function scan(){
  const out=[];
  const riskDollar=state.equity*perTradePct();
  for(const strat of state.strategies){
    if(!strat.enabled)continue;
    for(const sym of strat.symbols){
      const sig=signal(strat.kind,strat.params,sym);
      if(!sig)continue;
      const price=state.prices[sym]; const isOpt=KINDS[strat.kind].assetMode==="option";
      let entry=price,stop,take,size,sizeLabel,rr,riskAmt,instrument;
      if(isOpt){
        const premiumBudget=Math.min(riskDollar,state.equity*state.risk.maxOptionPremiumPct,state.cash);
        riskAmt=premiumBudget;                 // defined risk: max loss = premium
        size=premiumBudget; sizeLabel=fmt$(premiumBudget)+" premium";
        instrument=sig.dir==="up"?"CALL":"PUT";
        stop=sig.stopPct; take=sig.takePct;    // in % of premium
        rr=sig.takePct/sig.stopPct;            // 2:1
      } else {
        if(sig.dir==="down")  // long-only underlying: cannot short
          { out.push(skipIdea(strat,sym,sig,"bearish signal — shorting disabled (long-only)")); continue; }
        const stopDist=price*sig.stopPct;
        const qtyRisk=riskDollar/stopDist;
        const notionalCap=Math.min(strat.maxPositionSize,state.cash);
        let qty=Math.min(qtyRisk,notionalCap/price);
        qty=SYM[sym].assetType==="equity"?Math.floor(qty):Math.floor(qty*1e4)/1e4;
        size=qty; sizeLabel=fmtq(qty)+" units";
        entry=price; stop=price*(1-sig.stopPct); take=price*(1+sig.takePct);
        riskAmt=qty*stopDist; rr=sig.takePct/sig.stopPct; instrument="LONG";
      }
      const vs=volScore(sym);
      const score=Math.round(50*sig.confidence+30*Math.min(rr/3,1)+20*vs);
      out.push({id:strat.id+":"+sym,strategyId:strat.id,strategyName:strat.name,kind:strat.kind,
        symbol:sym,assetType:SYM[sym].assetType,instrument,dir:sig.dir,
        entry,stop,take,stopPct:sig.stopPct,takePct:sig.takePct,size,sizeLabel,
        rr,confidence:sig.confidence,vol:vs,riskAmt,score,reason:sig.reason,actionable:size>0});
    }
  }
  out.sort((a,b)=>(b.score||0)-(a.score||0));
  return out;
}
function skipIdea(strat,sym,sig,why){ return {id:strat.id+":"+sym,strategyId:strat.id,strategyName:strat.name,kind:strat.kind,symbol:sym,assetType:SYM[sym].assetType,instrument:"—",dir:sig.dir,reason:sig.reason,skip:why,confidence:sig.confidence,vol:volScore(sym),actionable:false,score:0}; }

//============================ Risk gates ============================
function perTradePct(){ const r=state.risk; return Math.min(r.aggressive?r.perTradePctAgg:r.perTradePct, 0.03); }
function maxPositions(){ const r=state.risk; return r.aggressive?r.maxPositionsAgg:r.maxPositions; }
function dayStart(){ const d=new Date(); d.setHours(0,0,0,0); return d.getTime(); }
function weekStart(){ const d=new Date(); const day=(d.getDay()+6)%7; d.setHours(0,0,0,0); return d.getTime()-day*86400000; }
function pnlSince(t){ return state.trades.filter(x=>x.t>=t&&x.pnl!=null).reduce((s,x)=>s+x.pnl,0); }
function consecutiveLosses(){ let n=0; for(const t of state.trades){ if(t.pnl==null)continue; if(t.pnl<0)n++; else break; } return n; }
function isPaused(){ return Date.now()<state.risk.pausedUntil; }
// Returns "" if clear to trade, else the blocking reason.
function tradingBlock(){
  const r=state.risk;
  if(r.killSwitch)return "Kill switch engaged";
  if(!r.dataFresh)return "Market data marked delayed/unclear — trading paused";
  if(isPaused())return `Auto-paused after losing streak (${Math.ceil((r.pausedUntil-Date.now())/60000)}m left)`;
  if(pnlSince(dayStart())<=-state.equity*r.dailyLossPct)return "Daily loss limit reached";
  if(pnlSince(weekStart())<=-state.equity*r.weeklyLossPct)return "Weekly loss limit reached";
  return "";
}

//============================ Execution (paper) ============================
function log(cat,msg){ state.logs.unshift({t:Date.now(),cat,msg}); if(state.logs.length>700)state.logs.length=700; }
function tradesTodayFor(id){ return state.trades.filter(t=>t.t>=dayStart()&&t.strategyId===id&&t.side==="buy").length; }

function enter(opp,manual){
  const block=tradingBlock();
  if(block){ log("skip",`SKIP ${opp.symbol} (${opp.strategyName}): ${block}`); return {ok:false,why:block}; }
  if(!opp.actionable){ log("skip",`SKIP ${opp.symbol} (${opp.strategyName}): ${opp.skip||"not actionable"}`); return {ok:false,why:opp.skip}; }
  if(state.positions.length>=maxPositions()){ log("skip",`SKIP ${opp.symbol}: max open trades (${maxPositions()})`); return {ok:false,why:"max open trades"}; }
  if(state.positions.find(p=>p.strategyId===opp.strategyId&&p.symbol===opp.symbol)) return {ok:false,why:"already open"};
  if(opp.riskAmt>state.cash){ log("skip",`SKIP ${opp.symbol}: insufficient cash`); return {ok:false,why:"insufficient cash"}; }
  const isOpt=opp.instrument==="CALL"||opp.instrument==="PUT";
  const pos={id:"p"+Date.now()+Math.random().toString(36).slice(2,6),strategyId:opp.strategyId,strategyName:opp.strategyName,
    symbol:opp.symbol,assetType:opp.assetType,instrument:opp.instrument,dir:opp.dir,opened:Date.now(),
    reason:opp.reason,rr:opp.rr,riskAmt:opp.riskAmt};
  if(isOpt){
    pos.premium=opp.size; pos.value=opp.size; pos.uEntry=state.prices[opp.symbol]; pos.optDir=opp.dir==="up"?1:-1;
    pos.stopVal=opp.size*(1-opp.stopPct); pos.takeVal=opp.size*(1+opp.takePct);
    state.cash-=opp.size;
  } else {
    pos.qty=opp.size; pos.avg=opp.entry; pos.price=opp.entry; pos.value=opp.size*opp.entry; pos.upnl=0;
    pos.stop=opp.stop; pos.take=opp.take;
    state.cash-=opp.size*opp.entry;
  }
  state.positions.push(pos);
  state.trades.unshift({t:Date.now(),symbol:opp.symbol,side:"buy",instrument:opp.instrument,qty:isOpt?1:opp.size,price:isOpt?opp.size:opp.entry,strategyId:opp.strategyId});
  log("entry",`ENTER ${opp.instrument} ${opp.symbol} (${opp.strategyName}) — ${opp.sizeLabel}, R/R ${opp.rr.toFixed(1)}:1, risk ${fmt$(opp.riskAmt)} — ${opp.reason}`);
  save(); return {ok:true};
}
function markToMarket(){
  let posVal=0;
  for(const p of state.positions){
    const px=state.prices[p.symbol];
    if(p.instrument==="CALL"||p.instrument==="PUT"){
      const uret=(px-p.uEntry)/p.uEntry*p.optDir; const lev=5;
      p.value=Math.max(0,p.premium*(1+lev*uret)); p.upnl=p.value-p.premium; p.price=px;
    } else { p.price=px; p.value=px*p.qty; p.upnl=(px-p.avg)*p.qty; }
    posVal+=p.value;
  }
  state.equity=state.cash+posVal;
}
function exit(pos,reason){
  let pnl,proceeds;
  if(pos.instrument==="CALL"||pos.instrument==="PUT"){ proceeds=pos.value; pnl=pos.value-pos.premium; }
  else { proceeds=pos.price*pos.qty; pnl=(pos.price-pos.avg)*pos.qty; }
  state.cash+=proceeds; state.positions=state.positions.filter(p=>p.id!==pos.id);
  state.trades.unshift({t:Date.now(),symbol:pos.symbol,side:"sell",instrument:pos.instrument,qty:pos.qty||1,price:pos.price,pnl,strategyId:pos.strategyId});
  log("exit",`EXIT ${pos.instrument} ${pos.symbol} — ${reason} — P/L ${fmt$(pnl)}`);
}
function checkExits(){
  for(const p of [...state.positions]){
    if(p.instrument==="CALL"||p.instrument==="PUT"){
      if(p.value<=p.stopVal)exit(p,"stop-loss (premium -"+Math.round((1-p.stopVal/p.premium)*100)+"%)");
      else if(p.value>=p.takeVal)exit(p,"take-profit (premium +"+Math.round((p.takeVal/p.premium-1)*100)+"%)");
    } else {
      const px=state.prices[p.symbol];
      if(px<=p.stop)exit(p,"stop-loss");
      else if(px>=p.take)exit(p,"take-profit");
    }
  }
}

//============================ Engine ============================
let engineRunning=false,tickTimer=null;
function stepPrices(){
  for(const s of SYMBOLS){
    const vol=s.assetType==="crypto"?0.012:0.006;
    const last=state.prices[s.symbol];
    const np=Math.max(1e-6,last*(1+(Math.random()-0.5)*2*vol+0.0002));
    state.prices[s.symbol]=np;
    const h=state.history[s.symbol]; h.push(np); if(h.length>220)h.shift();
    const spike=Math.random()<0.06?2.5:1; const vv=state.volumes[s.symbol]; vv.push(1e6*(0.6+Math.random())*spike); if(vv.length>220)vv.shift();
  }
}
function tick(){
  stepPrices(); markToMarket(); checkExits();
  // losing-streak auto-pause
  if(!isPaused()&&consecutiveLosses()>=state.risk.maxConsecutiveLosses){
    state.risk.pausedUntil=Date.now()+state.risk.pauseMinutes*60000;
    log("risk",`AUTO-PAUSE: ${consecutiveLosses()} losses in a row — halting new entries for ${state.risk.pauseMinutes}m`);
  }
  state.opps=scan();
  if(engineRunning){
    const block=tradingBlock();
    if(block){ /* engine idles; reasons visible on dashboard */ }
    else { for(const opp of state.opps){ if(!opp.actionable)continue; if(state.positions.length>=maxPositions())break; enter(opp,false); } }
  }
  markToMarket(); save(); liveUpdate();
}
function startEngine(){ if(engineRunning)return; if(state.risk.killSwitch){alert("Kill switch is engaged. Disengage it in Risk Controls first.");return;}
  engineRunning=true; log("system","Engine started — scanning for aggressive opportunities"); tickTimer=setInterval(tick,2000); tick(); }
function stopEngine(){ engineRunning=false; if(tickTimer)clearInterval(tickTimer); tickTimer=null; log("system","Engine stopped"); save(); render(); }
function emergencyStop(){ if(!confirm("EMERGENCY STOP: halt the engine, engage the kill switch, and close ALL open positions at market?"))return;
  stopEngine(); state.risk.killSwitch=true; for(const p of [...state.positions])exit(p,"emergency stop");
  log("risk","EMERGENCY STOP — kill switch engaged, all positions flattened"); save(); render(); }

//============================ Backtest ============================
function backtest(kind,params,sym,bars){
  const a=SYM[sym]; const vol=a.assetType==="crypto"?0.03:0.014; let p=a.base; const ser=[],vols=[];
  for(let i=0;i<bars;i++){ p=Math.max(1e-6,p*(1+(Math.random()-0.5)*2*vol+0.0003)); ser.push(p); vols.push(1e6*(0.6+Math.random())); }
  const isOpt=KINDS[kind].assetMode==="option";
  let cash=100000,pos=null; const pnls=[]; let peak=100000,maxDD=0,eqEnd=100000;
  const savedH=state.history[sym], savedV=state.volumes[sym], savedP=state.prices[sym];
  for(let i=40;i<ser.length;i++){
    state.history[sym]=ser.slice(0,i+1); state.volumes[sym]=vols.slice(0,i+1); state.prices[sym]=ser[i];
    const price=ser[i];
    if(pos){
      if(isOpt){ const uret=(price-pos.uEntry)/pos.uEntry*pos.optDir; const val=Math.max(0,pos.prem*(1+5*uret));
        if(val<=pos.prem*0.5||val>=pos.prem*2){ pnls.push(val-pos.prem); cash+=val; pos=null; } }
      else { if(price<=pos.stop){pnls.push((pos.stop-pos.entry)*pos.qty);cash+=pos.stop*pos.qty;pos=null;}
        else if(price>=pos.take){pnls.push((pos.take-pos.entry)*pos.qty);cash+=pos.take*pos.qty;pos=null;} }
    }
    if(!pos){ const sig=signal(kind,params,sym);
      if(sig&&(isOpt||sig.dir==="up")){
        if(isOpt){ const prem=cash*0.03; pos={prem,uEntry:price,optDir:sig.dir==="up"?1:-1}; cash-=prem; }
        else { const risk=cash*0.02,sd=price*sig.stopPct,qty=Math.min(risk/sd,cash*0.95/price); pos={qty,entry:price,stop:price*(1-sig.stopPct),take:price*(1+sig.takePct)}; cash-=qty*price; } } }
    const eq=cash+(pos?(isOpt?pos.prem:pos.qty*price):0); peak=Math.max(peak,eq); maxDD=Math.max(maxDD,(peak-eq)/peak); eqEnd=eq;
  }
  state.history[sym]=savedH; state.volumes[sym]=savedV; state.prices[sym]=savedP;
  const wins=pnls.filter(x=>x>0); const avgW=wins.length?wins.reduce((a,b)=>a+b,0)/wins.length:0;
  const losses=pnls.filter(x=>x<0); const avgL=losses.length?losses.reduce((a,b)=>a+b,0)/losses.length:0;
  return {sym,kind,ret:(eqEnd-100000)/100000,maxDD,winRate:pnls.length?wins.length/pnls.length:0,trades:pnls.length,avgW,avgL,expectancy:pnls.length?pnls.reduce((a,b)=>a+b,0)/pnls.length:0};
}

//============================ Formatting ============================
function fmt$(n){ return n==null||!isFinite(n)?"—":n.toLocaleString("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0}); }
function fmt(n){ return n==null||!isFinite(n)?"—":n.toLocaleString("en-US",{maximumFractionDigits:n<1?4:2}); }
function fmtq(n){ return n==null?"—":(+n).toLocaleString("en-US",{maximumFractionDigits:4}); }
function pct(n){ return n==null||!isFinite(n)?"—":(n*100).toFixed(1)+"%"; }
function ago(t){ const s=Math.floor((Date.now()-t)/1000); if(s<60)return s+"s ago"; const m=Math.floor(s/60); if(m<60)return m+"m ago"; return Math.floor(m/60)+"h ago"; }
function pcls(n){ return n>0?"pos":n<0?"neg":"muted"; }
function isEquityOpen(){ const d=new Date(); const day=d.getDay(); if(day===0||day===6)return false; const m=d.getHours()*60+d.getMinutes(); return m>=570&&m<960; }

//============================ Charts ============================
function lineChart(data,stroke){ stroke=stroke||"var(--accent)";
  if(!data||data.length<2)return '<div class="empty">Not enough data — start the engine.</div>';
  const w=600,h=150,min=Math.min(...data),max=Math.max(...data),rng=(max-min)||1,step=w/(data.length-1);
  const pts=data.map((v,i)=>[i*step,h-((v-min)/rng)*(h-10)-5]);
  const path=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ");
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%" preserveAspectRatio="none"><path d="${path} L${w},${h} L0,${h} Z" fill="${stroke}" opacity="0.08"/><path d="${path}" fill="none" stroke="${stroke}" stroke-width="2" vector-effect="non-scaling-stroke"/></svg>`; }
function meter(v,color){ return `<div class="meter"><i style="width:${Math.round(v*100)}%;background:${color}"></i></div>`; }

  for(const [name,kind,symbols] of presets){ if(state.strategies.find(s=>s.kind===kind))continue;
    const s={id:"s"+Date.now()+Math.random().toString(36).slice(2,5),name,kind,symbols,params:{},maxPositionSize:8000,enabled:true};
    s.backtest=backtest(kind,{},symbols[0],400); state.strategies.push(s); }
  log("system","Loaded full aggressive preset (7 strategies, auto-backtested)"); save(); render(); }

function renderPortfolio(){
  document.getElementById("portfolio").innerHTML=`<h1>Portfolio</h1>
    <div class="grid g4" style="margin-bottom:14px">${statCard("Equity",fmt$(state.equity))}${statCard("Cash",fmt$(state.cash))}${statCard("Unrealized",fmt$(state.positions.reduce((s,p)=>s+(p.upnl||0),0)),"",pcls(state.positions.reduce((s,p)=>s+(p.upnl||0),0)))}${statCard("Open",state.positions.length)}</div>
    <div class="card" style="padding:0;overflow:auto">${state.positions.length===0?'<div class="empty">No open positions.</div>':`<table><thead><tr><th>Symbol</th><th>Type</th><th>Strategy</th><th>Size</th><th>Entry</th><th>Now</th><th>Value</th><th>P/L</th><th>Stop→Take</th></tr></thead><tbody>${state.positions.map(p=>{const opt=p.instrument!=='LONG';return `<tr><td><b>${p.symbol}</b></td><td><span class="badge ${p.instrument==='PUT'?'b-neg':p.instrument==='CALL'?'b-accent':'b-default'}">${p.instrument}</span></td><td class="muted">${p.strategyName||''}</td><td>${opt?fmt$(p.premium)+" prem":fmtq(p.qty)}</td><td>${opt?fmt(p.uEntry):fmt(p.avg)}</td><td>${fmt(p.price)}</td><td>${fmt$(p.value)}</td><td class="${pcls(p.upnl)}">${fmt$(p.upnl)}</td><td class="muted">${opt?'-'+Math.round((1-p.stopVal/p.premium)*100)+'% / +'+Math.round((p.takeVal/p.premium-1)*100)+'%':fmt(p.stop)+' → '+fmt(p.take)}</td></tr>`;}).join("")}</tbody></table>`}</div>`;
}
function renderHistory(){
  document.getElementById("history").innerHTML=`<h1>Trade History</h1>
    <div class="card" style="padding:0;overflow:auto">${state.trades.length===0?'<div class="empty">No trades yet.</div>':`<table><thead><tr><th>Time</th><th>Symbol</th><th>Type</th><th>Side</th><th>Price</th><th>P/L</th></tr></thead><tbody>${state.trades.slice(0,120).map(t=>`<tr><td class="muted">${ago(t.t)}</td><td><b>${t.symbol}</b></td><td><span class="badge b-default">${t.instrument||'LONG'}</span></td><td><span class="badge ${t.side==='buy'?'b-pos':'b-neg'}">${t.side}</span></td><td>${fmt(t.price)}</td><td class="${pcls(t.pnl)}">${t.pnl!=null?fmt$(t.pnl):'—'}</td></tr>`).join("")}</tbody></table>`}</div>`;
}
function renderRisk(){ const r=state.risk;
  document.getElementById("risk").innerHTML=`<h1>Risk Controls</h1><p class="muted" style="margin-top:0">Aggressive on upside, strict on downside. These limits are always enforced.</p>
    <div class="grid g3">
      <div class="card"><div class="row" style="justify-content:space-between"><b>Aggressive Mode</b><div class="switch ${r.aggressive?'on':''}" onclick="toggleAgg()"><div class="knob"></div></div></div>
        <p class="muted" style="font-size:13px">Raises risk-per-trade to ${pct(r.perTradePctAgg)} and max open trades to ${r.maxPositionsAgg}. Daily/weekly loss limits, stops, and the streak auto-pause still apply.</p></div>
      <div class="card"><div class="row" style="justify-content:space-between"><b>Kill Switch</b><span class="badge ${r.killSwitch?'b-neg':'b-pos'}">${r.killSwitch?'ENGAGED':'Clear'}</span></div>
        <p class="muted" style="font-size:13px">Halts engine and flattens positions.</p>${r.killSwitch?'<button class="btn-success" onclick="disengage()">Disengage</button>':'<button class="btn-danger" onclick="emergencyStop()">Emergency stop</button>'}</div>
      <div class="card"><div class="row" style="justify-content:space-between"><b>Market Data</b><span class="badge ${r.dataFresh?'b-pos':'b-neg'}">${r.dataFresh?'OK':'DELAYED'}</span></div>
        <p class="muted" style="font-size:13px">No trades are placed if data is delayed/unclear.</p><button class="btn-secondary" onclick="toggleData()">${r.dataFresh?'Simulate data delay':'Mark data OK'}</button></div>
    </div>
    <div class="card" style="margin-top:14px"><h3>Limits</h3><div class="grid g4">
      <label class="field"><span>Risk / trade — standard %</span><input id="rPer" type="number" step="0.1" value="${(r.perTradePct*100).toFixed(1)}"></label>
      <label class="field"><span>Risk / trade — aggressive % (max 3)</span><input id="rPerA" type="number" step="0.1" value="${(r.perTradePctAgg*100).toFixed(1)}"></label>
      <label class="field"><span>Max daily loss %</span><input id="rDay" type="number" step="0.1" value="${(r.dailyLossPct*100).toFixed(1)}"></label>
      <label class="field"><span>Max weekly loss %</span><input id="rWk" type="number" step="0.1" value="${(r.weeklyLossPct*100).toFixed(1)}"></label>
      <label class="field"><span>Max open trades (standard)</span><input id="rPos" type="number" value="${r.maxPositions}"></label>
      <label class="field"><span>Max open trades (aggressive)</span><input id="rPosA" type="number" value="${r.maxPositionsAgg}"></label>
      <label class="field"><span>Auto-pause after N losses</span><input id="rStk" type="number" value="${r.maxConsecutiveLosses}"></label>
      <label class="field"><span>Pause duration (min)</span><input id="rPause" type="number" value="${r.pauseMinutes}"></label>
      <label class="field"><span>Max option premium % of equity</span><input id="rOpt" type="number" step="0.1" value="${(r.maxOptionPremiumPct*100).toFixed(1)}"></label>
    </div>
    <button class="btn-primary" onclick="saveRisk()">Save limits</button>
    <button class="btn-ghost" onclick="resetAll()" style="margin-left:8px">Reset paper account</button>
    <div class="muted" style="font-size:12px;margin-top:10px">Enforced always: stop-loss + take-profit on every trade · long-only underlyings (no shorting) · options buying only, never naked · risk/trade hard-capped at 3%.</div></div>`;
}
function toggleAgg(){ state.risk.aggressive=!state.risk.aggressive; log("risk",`Aggressive mode ${state.risk.aggressive?'ENABLED':'disabled'}`); save(); render(); }
function toggleData(){ state.risk.dataFresh=!state.risk.dataFresh; log("risk",`Market data marked ${state.risk.dataFresh?'OK':'DELAYED — trading paused'}`); save(); render(); }
function disengage(){ state.risk.killSwitch=false; log("system","Kill switch disengaged"); save(); render(); }
function saveRisk(){ const r=state.risk, g=id=>+document.getElementById(id).value;
  r.perTradePct=Math.min(g("rPer")/100,0.03); r.perTradePctAgg=Math.min(g("rPerA")/100,0.03);
  r.dailyLossPct=g("rDay")/100; r.weeklyLossPct=g("rWk")/100; r.maxPositions=g("rPos"); r.maxPositionsAgg=g("rPosA");
  r.maxConsecutiveLosses=g("rStk"); r.pauseMinutes=g("rPause"); r.maxOptionPremiumPct=g("rOpt")/100;
  log("risk","Risk limits updated"); save(); render(); }
function resetAll(){ if(!confirm("Reset the paper account? Clears positions, trades, strategies and logs."))return; stopEngine(); const t=state.theme; state=freshState(); state.theme=t; save(); render(); }

function renderLogs(){ const cats=["all","entry","exit","skip","risk","system"]; window._lc=window._lc||"all";
  const rows=state.logs.filter(l=>window._lc==="all"||l.cat===window._lc);
  const tone={entry:"b-pos",exit:"b-accent",skip:"b-warn",risk:"b-neg",system:"b-default"};
  document.getElementById("logs").innerHTML=`<h1>Logs</h1><p class="muted" style="margin-top:0">Why every trade was entered, skipped, or exited.</p>
    <div class="row" style="margin-bottom:12px">${cats.map(c=>`<button class="pill ${window._lc===c?'active':''}" onclick="setLC('${c}')">${c}</button>`).join("")}</div>
    <div class="card" style="padding:0;max-height:70vh;overflow:auto">${rows.length===0?'<div class="empty">No log entries.</div>':rows.map(l=>`<div style="display:flex;gap:10px;padding:9px 12px;border-bottom:1px solid var(--border);font-size:13px"><span class="badge ${tone[l.cat]||'b-default'}">${l.cat}</span><div><div>${l.msg}</div><div class="muted" style="font-size:11px">${new Date(l.t).toLocaleString()}</div></div></div>`).join("")}</div>`;
}
function setLC(c){ window._lc=c; renderLogs(); }

//============================ Wiring ============================
document.getElementById("startBtn").onclick=()=>engineRunning?stopEngine():startEngine();
document.getElementById("stopAll").onclick=emergencyStop;
document.getElementById("themeBtn").onclick=()=>{ state.theme=state.theme==="dark"?"light":"dark"; applyTheme(); save(); };
function applyTheme(){ document.body.className=state.theme==="light"?"light":""; }
Object.assign(window,{go,execOpp,addStrategy,toggleStrat,delStrat,runBT,seedDefaults,toggleAgg,toggleData,disengage,saveRisk,resetAll,setLC,emergencyStop});

applyTheme(); renderNav();
if(state.strategies.length===0){ seedDefaults(); }
state.opps=scan(); render();
</script>
</body>
</html>
