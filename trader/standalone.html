<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TMAC Trader — Paper Trading Dashboard</title>
<style>
  :root{
    --bg:#0b0e14;--surface:#121722;--surface2:#1a2130;--border:#232c3d;
    --text:#e7ecf3;--muted:#93a0b4;--accent:#6366f1;--accentfg:#fff;
    --pos:#2ecc71;--neg:#ff5a52;--warn:#f59e0b;
  }
  .light{
    --bg:#f7f8fa;--surface:#fff;--surface2:#f1f3f6;--border:#e3e6eb;
    --text:#11151c;--muted:#5b6471;--accent:#4f46e5;--accentfg:#fff;
    --pos:#0f9d58;--neg:#e0322c;--warn:#d97706;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  .app{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
  aside{background:var(--surface);border-right:1px solid var(--border);position:sticky;top:0;height:100vh}
  .brand{display:flex;align-items:center;gap:8px;height:56px;padding:0 16px;border-bottom:1px solid var(--border);font-weight:600}
  .brand .dot{width:18px;height:18px;border-radius:5px;background:var(--accent)}
  nav{padding:10px}
  nav a{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;color:var(--muted);text-decoration:none;font-size:14px;cursor:pointer;margin-bottom:2px}
  nav a.active{background:var(--accent);color:var(--accentfg)}
  nav a:hover:not(.active){background:var(--surface2)}
  .note{position:absolute;bottom:0;width:220px;padding:12px;border-top:1px solid var(--border);font-size:11px;color:var(--muted)}
  header{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:10px;height:56px;padding:0 18px;background:color-mix(in srgb,var(--surface) 85%,transparent);backdrop-filter:blur(8px);border-bottom:1px solid var(--border)}
  main{padding:20px}
  .badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:12px;font-weight:600}
  .b-pos{background:color-mix(in srgb,var(--pos) 18%,transparent);color:var(--pos)}
  .b-neg{background:color-mix(in srgb,var(--neg) 18%,transparent);color:var(--neg)}
  .b-warn{background:color-mix(in srgb,var(--warn) 18%,transparent);color:var(--warn)}
  .b-accent{background:color-mix(in srgb,var(--accent) 18%,transparent);color:var(--accent)}
  .b-default{background:var(--surface2);color:var(--muted)}
  button{font:inherit;border:none;border-radius:9px;padding:8px 12px;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .btn-primary{background:var(--accent);color:var(--accentfg)}
  .btn-secondary{background:var(--surface2);color:var(--text)}
  .btn-danger{background:var(--neg);color:#fff}
  .btn-success{background:var(--pos);color:#fff}
  .btn-ghost{background:transparent;color:var(--muted)}
  button:disabled{opacity:.5;cursor:not-allowed}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:16px}
  .grid{display:grid;gap:14px}
  .g4{grid-template-columns:repeat(4,1fr)}
  .g2{grid-template-columns:repeat(2,1fr)}
  .stat .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
  .stat .val{font-size:24px;font-weight:700;margin-top:6px;font-variant-numeric:tabular-nums}
  .stat .sub{font-size:12px;color:var(--muted);margin-top:3px}
  h1{font-size:22px;margin:0 0 4px}
  h3{font-size:14px;margin:0 0 12px}
  .muted{color:var(--muted)}
  .pos{color:var(--pos)}.neg{color:var(--neg)}
  table{width:100%;border-collapse:collapse;font-size:13px;font-variant-numeric:tabular-nums}
  th{text-align:left;font-size:11px;text-transform:uppercase;color:var(--muted);padding:8px 10px;border-bottom:1px solid var(--border)}
  td{padding:8px 10px;border-bottom:1px solid var(--border)}
  tr:last-child td{border-bottom:none}
  input,select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:8px 10px;color:var(--text);font:inherit;font-size:14px;outline:none}
  input:focus,select:focus{border-color:var(--accent)}
  label.field{display:block;margin-bottom:10px}
  label.field span{display:block;font-size:11px;color:var(--muted);margin-bottom:4px}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .section{display:none}
  .section.active{display:block}
  .disc{display:flex;gap:10px;border:1px solid color-mix(in srgb,var(--warn) 40%,transparent);background:color-mix(in srgb,var(--warn) 10%,transparent);border-radius:11px;padding:11px;font-size:13px;color:var(--muted);margin-bottom:18px}
  .empty{padding:30px;text-align:center;color:var(--muted)}
  .switch{position:relative;width:38px;height:20px;border-radius:999px;background:var(--border);cursor:pointer;transition:.15s}
  .switch.on{background:var(--accent)}
  .switch .knob{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.15s}
  .switch.on .knob{left:20px}
  .pill{padding:4px 10px;border-radius:9px;font-size:13px;background:var(--surface2);color:var(--muted);cursor:pointer;border:none}
  .pill.active{background:var(--accent);color:var(--accentfg)}
  @media(max-width:820px){.app{grid-template-columns:1fr}aside{display:none}.g4{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <aside>
    <div class="brand"><span class="dot"></span> TMAC Trader</div>
    <nav id="nav"></nav>
    <div class="note">Not financial advice. This is a paper-trading simulator — no real money, no broker connection.</div>
  </aside>
  <div>
    <header>
      <span id="modeBadge" class="badge b-pos">PAPER MODE</span>
      <span id="engineBadge" class="badge b-default">Engine stopped</span>
      <div class="row" style="margin-left:auto;gap:6px">
        <span id="mkt" class="muted" style="font-size:12px"></span>
        <button id="startBtn" class="btn-primary">▶ Start</button>
        <button id="stopAll" class="btn-danger">■ Stop Trading</button>
        <button id="themeBtn" class="btn-ghost">◐</button>
      </div>
    </header>
    <main>
      <div id="dashboard" class="section active"></div>
      <div id="strategies" class="section"></div>
      <div id="portfolio" class="section"></div>
      <div id="history" class="section"></div>
      <div id="risk" class="section"></div>
      <div id="logs" class="section"></div>
    </main>
  </div>
</div>
<script>
"use strict";
//============================ State ============================
const STARTING_EQUITY = 100000;
const SYMBOLS = [
  {symbol:"BTC-USD",assetType:"crypto",base:65000},
  {symbol:"ETH-USD",assetType:"crypto",base:3500},
  {symbol:"SOL-USD",assetType:"crypto",base:150},
  {symbol:"AAPL",assetType:"equity",base:220},
  {symbol:"SPY",assetType:"equity",base:560},
];
const STRATEGY_KINDS = {
  ma_crossover:{name:"MA Crossover",params:{fast:10,slow:30}},
  rsi:{name:"RSI Oversold/Overbought",params:{period:14,oversold:35,overbought:65}},
  mean_reversion:{name:"Mean Reversion",params:{period:20,bands:1.5}},
  momentum:{name:"Momentum",params:{lookback:10,threshold:2}},
  breakout:{name:"Breakout",params:{lookback:20}},
};
let state = load() || freshState();

function freshState(){
  const prices={}; const history={};
  for(const s of SYMBOLS){ prices[s.symbol]=s.base; history[s.symbol]=seedHistory(s.base, s.assetType); }
  return {
    cash:STARTING_EQUITY, equity:STARTING_EQUITY,
    positions:[], trades:[], logs:[], strategies:[], backtests:[],
    prices, history,
    risk:{ killSwitch:false, liveEnabled:false, perTradePct:0.01, dailyLossPct:0.03, maxPositions:8, maxTradesPerDay:8 },
    theme:"dark",
  };
}
function seedHistory(base,assetType){
  const vol = assetType==="crypto"?0.03:0.012; let p=base; const out=[];
  for(let i=0;i<120;i++){ p=Math.max(0.01,p*(1+(Math.random()-0.5)*2*vol+0.0003)); out.push(p); }
  return out;
}

//============================ Persistence ============================
let storageOK=true;
function save(){
  try{ localStorage.setItem("tmac_trader_v1", JSON.stringify(state)); }
  catch(e){ storageOK=false; }
}
function load(){ try{ const r=localStorage.getItem("tmac_trader_v1"); return r?JSON.parse(r):null; }catch(e){ storageOK=false; return null; } }

//============================ Indicators ============================
function sma(arr,p){ if(arr.length<p)return NaN; let s=0; for(let i=arr.length-p;i<arr.length;i++)s+=arr[i]; return s/p; }
function rsi(arr,p){
  if(arr.length<p+1)return NaN; let g=0,l=0;
  for(let i=arr.length-p;i<arr.length;i++){ const d=arr[i]-arr[i-1]; if(d>=0)g+=d; else l-=d; }
  const ag=g/p, al=l/p; return al===0?100:100-100/(1+ag/al);
}
function stdev(arr,p){ const sl=arr.slice(-p); const m=sl.reduce((a,b)=>a+b,0)/sl.length; return Math.sqrt(sl.reduce((a,b)=>a+(b-m)**2,0)/sl.length); }

//============================ Strategies ============================
function evaluate(kind,params,hist,hasPos){
  const c=hist; const price=c[c.length-1];
  if(kind==="ma_crossover"){
    const f=params.fast,s=params.slow; if(c.length<s+2)return hold();
    const pf=sma(c.slice(0,-1),f),ps=sma(c.slice(0,-1),s),cf=sma(c,f),cs=sma(c,s);
    if([pf,ps,cf,cs].some(isNaN))return hold();
    if(pf<=ps&&cf>cs)return sig("buy",.6,`Fast MA(${f}) crossed above slow MA(${s})`);
    if(pf>=ps&&cf<cs)return sig("sell",.6,`Fast MA(${f}) crossed below slow MA(${s})`);
  } else if(kind==="rsi"){
    const r=rsi(c,params.period),pr=rsi(c.slice(0,-1),params.period); if(isNaN(r)||isNaN(pr))return hold();
    if(pr<=params.oversold&&r>params.oversold)return sig("buy",.6,`RSI ${r.toFixed(0)} recovered above oversold ${params.oversold}`);
    if(pr>=params.overbought&&r<params.overbought)return sig("sell",.6,`RSI ${r.toFixed(0)} dropped below overbought ${params.overbought}`);
  } else if(kind==="mean_reversion"){
    if(c.length<params.period+2)return hold();
    const m=sma(c,params.period),sd=stdev(c,params.period); if(isNaN(m)||sd===0)return hold();
    const z=(price-m)/sd;
    if(z<=-params.bands)return sig("buy",Math.min(1,-z/(params.bands*2)),`Price ${z.toFixed(2)}σ below mean — oversold`);
    if(z>=params.bands)return sig("sell",Math.min(1,z/(params.bands*2)),`Price ${z.toFixed(2)}σ above mean — overbought`);
  } else if(kind==="momentum"){
    const lb=params.lookback; if(c.length<lb+2)return hold();
    const roc=(price-c[c.length-1-lb])/c[c.length-1-lb];
    if(roc>=params.threshold/100)return sig("buy",Math.min(1,roc*20),`Momentum +${(roc*100).toFixed(1)}% over ${lb} bars`);
    if(roc<=-params.threshold/100)return sig("sell",Math.min(1,-roc*20),`Momentum ${(roc*100).toFixed(1)}% over ${lb} bars`);
  } else if(kind==="breakout"){
    const lb=params.lookback; if(c.length<lb+2)return hold();
    const prior=c.slice(-lb-1,-1); const hi=Math.max(...prior),lo=Math.min(...prior);
    if(price>hi)return sig("buy",.6,`Broke above ${lb}-bar high ${hi.toFixed(2)}`);
    if(price<lo)return sig("sell",.6,`Broke below ${lb}-bar low ${lo.toFixed(2)}`);
  }
  return hold();
}
const hold=()=>({action:"hold"});
const sig=(action,confidence,rationale)=>({action,confidence,rationale});

//============================ Engine ============================
let engineRunning=false, tickTimer=null;
function log(cat,msg){ state.logs.unshift({t:Date.now(),cat,msg}); if(state.logs.length>500)state.logs.length=500; }
function todayStart(){ const d=new Date(); d.setHours(0,0,0,0); return d.getTime(); }
function realizedToday(){ return state.trades.filter(t=>t.t>=todayStart()).reduce((s,t)=>s+(t.pnl||0),0); }
function tradesTodayFor(id){ return state.trades.filter(t=>t.t>=todayStart()&&t.strategyId===id).length; }

function stepPrices(){
  for(const s of SYMBOLS){
    const vol=s.assetType==="crypto"?0.012:0.006;
    const last=state.prices[s.symbol];
    const np=Math.max(0.01,last*(1+(Math.random()-0.5)*2*vol+0.0002));
    state.prices[s.symbol]=np;
    const h=state.history[s.symbol]; h.push(np); if(h.length>200)h.shift();
  }
}
function markToMarket(){
  let posVal=0;
  for(const p of state.positions){ p.price=state.prices[p.symbol]; p.value=p.price*p.qty; p.upnl=(p.price-p.avg)*p.qty; posVal+=p.value; }
  state.equity=state.cash+posVal;
}
function openPosition(strat,symbol,price,rationale){
  const assetType=SYMBOLS.find(s=>s.symbol===symbol).assetType;
  // risk gates
  if(state.risk.killSwitch){ return reject(strat,symbol,"Kill switch engaged"); }
  if(realizedToday()<=-state.equity*state.risk.dailyLossPct){ return reject(strat,symbol,"Daily loss limit reached"); }
  if(state.positions.length>=state.risk.maxPositions){ return reject(strat,symbol,"Max open positions reached"); }
  if(tradesTodayFor(strat.id)>=state.risk.maxTradesPerDay){ return reject(strat,symbol,"Max trades/day reached"); }
  if(state.positions.find(p=>p.strategyId===strat.id&&p.symbol===symbol)){ return; }
  const stopDist=price*strat.stopLossPct;
  const riskDollar=state.equity*state.risk.perTradePct;
  const qtyRisk=stopDist>0?riskDollar/stopDist:Infinity;
  const notionalCap=Math.min(strat.maxPositionSize,state.cash);
  if(notionalCap<=0){ return reject(strat,symbol,"No buying power"); }
  let qty=Math.min(qtyRisk,notionalCap/price);
  if(assetType==="equity")qty=Math.floor(qty); else qty=Math.floor(qty*1e4)/1e4;
  if(qty<=0){ return reject(strat,symbol,"Size rounds to zero under limits"); }
  state.cash-=qty*price;
  state.positions.push({id:"p"+Date.now()+Math.random().toString(36).slice(2,6),strategyId:strat.id,symbol,assetType,qty,avg:price,price,value:qty*price,upnl:0,
    stop:price*(1-strat.stopLossPct),take:price*(1+strat.takeProfitPct),opened:Date.now()});
  state.trades.unshift({t:Date.now(),symbol,side:"buy",qty,price,strategyId:strat.id});
  log("order",`FILLED buy ${fmtq(qty)} ${symbol} @ ${usd(price)} — ${rationale}`);
}
function closePosition(pos,price,reason){
  const pnl=(price-pos.avg)*pos.qty; state.cash+=price*pos.qty;
  state.positions=state.positions.filter(p=>p.id!==pos.id);
  state.trades.unshift({t:Date.now(),symbol:pos.symbol,side:"sell",qty:pos.qty,price,pnl,strategyId:pos.strategyId});
  log("order",`CLOSED ${pos.symbol} @ ${usd(price)} — ${reason} — P/L ${usd(pnl)}`);
}
function reject(strat,symbol,why){ log("rejection",`Rejected ${strat.name} ${symbol}: ${why}`); }

function tick(){
  stepPrices(); markToMarket();
  // protective exits
  for(const p of [...state.positions]){
    const price=state.prices[p.symbol];
    if(p.stop&&price<=p.stop)closePosition(p,price,"stop-loss");
    else if(p.take&&price>=p.take)closePosition(p,price,"take-profit");
  }
  if(!state.risk.killSwitch){
    for(const strat of state.strategies){
      if(!strat.enabled)continue;
      for(const symbol of strat.symbols){
        const hist=state.history[symbol]; const price=state.prices[symbol];
        const pos=state.positions.find(p=>p.strategyId===strat.id&&p.symbol===symbol);
        const r=evaluate(strat.kind,strat.params,hist,!!pos);
        if(r.action==="hold")continue;
        log("signal",`${strat.name} ${r.action.toUpperCase()} ${symbol} (${Math.round(r.confidence*100)}%): ${r.rationale}`);
        if(r.action==="buy"&&!pos)openPosition(strat,symbol,price,r.rationale);
        else if(r.action==="sell"&&pos)closePosition(pos,price,"strategy sell signal");
      }
    }
  }
  markToMarket(); save(); liveUpdate();
}
function startEngine(){ if(engineRunning)return; if(state.risk.killSwitch){alert("Kill switch is engaged. Disengage it in Risk Controls first.");return;}
  engineRunning=true; log("system","Engine started"); tickTimer=setInterval(tick,2000); tick(); }
function stopEngine(){ engineRunning=false; if(tickTimer)clearInterval(tickTimer); tickTimer=null; log("system","Engine stopped"); save(); render(); }
function emergencyStop(){ if(!confirm("EMERGENCY STOP: halt the engine, engage the kill switch, and close all open positions at market?"))return;
  stopEngine(); state.risk.killSwitch=true;
  for(const p of [...state.positions])closePosition(p,state.prices[p.symbol],"emergency stop");
  log("risk","EMERGENCY STOP — kill switch engaged, positions flattened"); save(); render(); }

//============================ Backtest ============================
function backtest(kind,params,symbol,bars,stopPct,takePct){
  const assetType=SYMBOLS.find(s=>s.symbol===symbol).assetType;
  const vol=assetType==="crypto"?0.03:0.012; let p=SYMBOLS.find(s=>s.symbol===symbol).base;
  const series=[]; for(let i=0;i<bars;i++){ p=Math.max(0.01,p*(1+(Math.random()-0.5)*2*vol+0.0003)); series.push(p); }
  let cash=100000,qty=0,entry=0,stop=0,take=0; const pnls=[]; const eq=[]; let peak=100000,maxDD=0;
  for(let i=30;i<series.length;i++){
    const c=series.slice(0,i+1); const price=c[c.length-1];
    if(qty>0){ if(stop&&price<=stop){cash+=qty*stop;pnls.push((stop-entry)*qty);qty=0;}
      else if(take&&price>=take){cash+=qty*take;pnls.push((take-entry)*qty);qty=0;} }
    const r=evaluate(kind,params,c,qty>0);
    if(r.action==="buy"&&qty===0){ qty=cash*0.95/price; entry=price; cash-=qty*price; stop=stopPct?entry*(1-stopPct):0; take=takePct?entry*(1+takePct):0; }
    else if(r.action==="sell"&&qty>0){ cash+=qty*price; pnls.push((price-entry)*qty); qty=0; }
    const equity=cash+qty*price; eq.push(equity); peak=Math.max(peak,equity); maxDD=Math.max(maxDD,(peak-equity)/peak);
  }
  if(qty>0){ const last=series[series.length-1]; cash+=qty*last; pnls.push((last-entry)*qty); }
  const wins=pnls.filter(x=>x>0);
  return {symbol,kind,ret:(cash-100000)/100000,maxDD,winRate:pnls.length?wins.length/pnls.length:0,trades:pnls.length,ending:cash,eq};
}

//============================ Formatting ============================
function usd(n){ return n==null||!isFinite(n)?"—":n.toLocaleString("en-US",{style:"currency",currency:"USD"}); }
function fmtq(n){ return n==null?"—":(+n).toLocaleString("en-US",{maximumFractionDigits:4}); }
function pct(n){ return n==null||!isFinite(n)?"—":(n*100).toFixed(2)+"%"; }
function ago(t){ const s=Math.floor((Date.now()-t)/1000); if(s<60)return s+"s ago"; const m=Math.floor(s/60); if(m<60)return m+"m ago"; return Math.floor(m/60)+"h ago"; }
function pcls(n){ return n>0?"pos":n<0?"neg":"muted"; }

//============================ Charts ============================
function lineChart(data,stroke){
  stroke=stroke||"var(--accent)";
  if(!data||data.length<2)return '<div class="empty">Not enough data yet — start the engine.</div>';
  const w=600,h=160,min=Math.min(...data),max=Math.max(...data),rng=(max-min)||1,step=w/(data.length-1);
  const pts=data.map((v,i)=>[i*step, h-((v-min)/rng)*(h-10)-5]);
  const path=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ");
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%" preserveAspectRatio="none">
    <path d="${path} L${w},${h} L0,${h} Z" fill="${stroke}" opacity="0.08"/>
    <path d="${path}" fill="none" stroke="${stroke}" stroke-width="2" vector-effect="non-scaling-stroke"/></svg>`;
}

//============================ Rendering ============================
const PAGES=[["dashboard","Dashboard"],["strategies","Strategies"],["portfolio","Portfolio"],["history","Trade History"],["risk","Risk Controls"],["logs","Logs"]];
let current="dashboard";
function renderNav(){
  document.getElementById("nav").innerHTML=PAGES.map(([id,label])=>
    `<a class="${id===current?'active':''}" onclick="go('${id}')">${label}</a>`).join("");
}
function go(id){ current=id; document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active"); renderNav(); render(); }

// Pages that are pure read-outs and safe to refresh on every engine tick.
// Form pages (strategies, risk) are NEVER auto-refreshed, so what you type or
// click is never wiped out from under you.
const DATA_PAGES=new Set(["dashboard","portfolio","history","logs"]);

function renderHeader(){
  document.getElementById("engineBadge").className="badge "+(engineRunning?"b-accent":"b-default");
  document.getElementById("engineBadge").textContent=engineRunning?"Engine running":"Engine stopped";
  const mb=document.getElementById("modeBadge");
  if(state.risk.killSwitch){mb.className="badge b-neg";mb.textContent="HALTED";}else{mb.className="badge b-pos";mb.textContent="PAPER MODE";}
  document.getElementById("startBtn").textContent=engineRunning?"■ Stop":"▶ Start";
  document.getElementById("startBtn").className=engineRunning?"btn-secondary":"btn-primary";
  document.getElementById("mkt").textContent="Crypto ● open · Equities "+(isEquityOpen()?"● open":"○ closed");
}
function renderPage(){
  if(current==="dashboard")renderDashboard();
  else if(current==="strategies")renderStrategies();
  else if(current==="portfolio")renderPortfolio();
  else if(current==="history")renderHistory();
  else if(current==="risk")renderRisk();
  else if(current==="logs")renderLogs();
}
// Full render — used by navigation and explicit user actions.
function render(){ renderHeader(); renderPage(); }
// Lightweight live refresh from the engine tick — header always, but only
// re-draw the page if it's a read-only data page (so forms stay intact).
function liveUpdate(){ renderHeader(); if(DATA_PAGES.has(current))renderPage(); }
function isEquityOpen(){ const d=new Date(); const day=d.getDay(); if(day===0||day===6)return false; const m=d.getHours()*60+d.getMinutes(); return m>=570&&m<960; }

function statCard(lbl,val,sub,cls){ return `<div class="card stat"><div class="lbl">${lbl}</div><div class="val ${cls||''}">${val}</div>${sub?`<div class="sub">${sub}</div>`:''}</div>`; }

function renderDashboard(){
  const todayPnl=realizedToday(); const upnl=state.positions.reduce((s,p)=>s+(p.upnl||0),0);
  const dailyLimit=state.equity*state.risk.dailyLossPct;
  const closed=state.trades.filter(t=>t.pnl!=null); const wins=closed.filter(t=>t.pnl>0).length;
  // equity curve from realized trades
  const tr=[...state.trades].filter(t=>t.pnl!=null).reverse();
  let cum=STARTING_EQUITY; const curve=[cum]; for(const t of tr){cum+=t.pnl;curve.push(cum);}
  document.getElementById("dashboard").innerHTML=`
    <h1>Dashboard</h1><p class="muted" style="margin-top:0">Paper-trading simulator — runs entirely in your browser.</p>
    <div class="disc">⚠️ <div><b style="color:var(--text)">Not financial advice.</b> Simulated trading only. No real money and no broker connection. For education/research.</div></div>
    ${storageOK?"":'<div class="disc" style="border-color:var(--neg);background:color-mix(in srgb,var(--neg) 10%,transparent)">🔒 <div>Your browser is blocking storage for local files, so changes won\'t survive a refresh (everything still works during this session). Tip: use Chrome, Edge, or Firefox — or keep the tab open.</div></div>'}
    <div class="grid g4">
      ${statCard("Account Equity",usd(state.equity),`Unrealized ${usd(upnl)}`)}
      ${statCard("Cash",usd(state.cash),"")}
      ${statCard("Open Positions",state.positions.length,`Max ${state.risk.maxPositions}`)}
      ${statCard("Today P/L",usd(todayPnl),"",pcls(todayPnl))}
      ${statCard("Daily Loss Limit",usd(dailyLimit),"3% of equity")}
      ${statCard("Active Strategies",state.strategies.filter(s=>s.enabled).length,`${state.strategies.length} configured`)}
      ${statCard("Win Rate",closed.length?Math.round(wins/closed.length*100)+"%":"—",`${wins}/${closed.length} closed`)}
      ${statCard("Mode","PAPER","Live disabled")}
    </div>
    <div class="grid g2" style="margin-top:14px">
      <div class="card"><h3>Portfolio Performance (realized equity)</h3>${lineChart(curve)}</div>
      <div class="card"><h3>BTC-USD price</h3>${lineChart(state.history["BTC-USD"].slice(-80),"var(--pos)")}</div>
    </div>
    ${state.strategies.length===0?`<div class="card" style="margin-top:14px"><div class="row" style="justify-content:space-between"><div><b>No strategies yet.</b><div class="muted" style="font-size:13px">Add one to start trading on paper.</div></div><button class="btn-primary" onclick="go('strategies')">Go to Strategies →</button></div></div>`:""}
  `;
}

function renderStrategies(){
  const opts=Object.entries(STRATEGY_KINDS).map(([k,v])=>`<option value="${k}">${v.name}</option>`).join("");
  const symOpts=SYMBOLS.map(s=>`<label style="display:inline-flex;gap:5px;align-items:center;margin-right:12px;font-size:13px"><input type="checkbox" style="width:auto" class="symchk" value="${s.symbol}"> ${s.symbol}</label>`).join("");
  document.getElementById("strategies").innerHTML=`
    <h1>Strategies</h1><p class="muted" style="margin-top:0">Add modular strategies with their own risk limits. New strategies start enabled in paper mode.</p>
    <div class="card" style="margin-bottom:14px"><h3>New strategy</h3>
      <div class="grid" style="grid-template-columns:1fr 1fr 1fr">
        <label class="field"><span>Name</span><input id="sName" placeholder="My BTC strategy"></label>
        <label class="field"><span>Type</span><select id="sKind" onchange="presetParams()">${opts}</select></label>
        <label class="field"><span>Max position size ($)</span><input id="sMax" type="number" value="5000"></label>
        <label class="field"><span>Stop loss %</span><input id="sStop" type="number" value="3" step="0.5"></label>
        <label class="field"><span>Take profit %</span><input id="sTake" type="number" value="6" step="0.5"></label>
        <label class="field"><span id="pHint">Parameters</span><input id="sParams" placeholder="fast=10, slow=30"></label>
      </div>
      <div style="margin:6px 0"><span style="font-size:11px;color:var(--muted)">Symbols</span><div style="margin-top:6px">${symOpts}</div></div>
      <button class="btn-primary" onclick="addStrategy()" style="margin-top:10px">+ Add strategy</button>
    </div>
    <div class="grid g2">${state.strategies.map(stratCard).join("")||'<div class="empty card">No strategies configured.</div>'}</div>
  `;
  presetParams();
}
function presetParams(){
  const k=document.getElementById("sKind"); if(!k)return;
  const def=STRATEGY_KINDS[k.value].params;
  document.getElementById("sParams").value=Object.entries(def).map(([a,b])=>`${a}=${b}`).join(", ");
  document.getElementById("pHint").textContent="Parameters ("+Object.keys(def).join(", ")+")";
}
function stratCard(s){
  const bt=state.backtests.find(b=>b.strategyId===s.id);
  return `<div class="card"><div class="row" style="justify-content:space-between">
    <div><b>${s.name}</b> <span class="badge b-default">${STRATEGY_KINDS[s.kind].name}</span></div>
    <div class="switch ${s.enabled?'on':''}" onclick="toggleStrat('${s.id}')"><div class="knob"></div></div></div>
    <div class="muted" style="font-size:12px;margin-top:6px">${s.symbols.join(", ")} · stop ${(s.stopLossPct*100).toFixed(1)}% · target ${(s.takeProfitPct*100).toFixed(1)}% · max ${usd(s.maxPositionSize)}</div>
    <div class="muted" style="font-size:12px;margin-top:4px">params: ${Object.entries(s.params).map(([a,b])=>a+"="+b).join(", ")}</div>
    ${bt?`<div style="font-size:12px;margin-top:6px">Backtest: return <span class="${pcls(bt.ret)}">${pct(bt.ret)}</span>, win ${pct(bt.winRate)}, ${bt.trades} trades, maxDD ${pct(bt.maxDD)}</div>`:""}
    <div class="row" style="margin-top:10px">
      <button class="btn-secondary" onclick="runBT('${s.id}')">Backtest</button>
      <button class="btn-danger" style="margin-left:auto" onclick="delStrat('${s.id}')">Delete</button>
    </div></div>`;
}
function addStrategy(){
  const name=document.getElementById("sName").value.trim()||STRATEGY_KINDS[document.getElementById("sKind").value].name;
  const kind=document.getElementById("sKind").value;
  const symbols=[...document.querySelectorAll(".symchk:checked")].map(c=>c.value);
  if(symbols.length===0){alert("Pick at least one symbol.");return;}
  const params={...STRATEGY_KINDS[kind].params};
  document.getElementById("sParams").value.split(",").forEach(kv=>{const[a,b]=kv.split("=").map(x=>x&&x.trim()); if(a&&b!=null&&!isNaN(+b))params[a]=+b;});
  state.strategies.push({id:"s"+Date.now(),name,kind,symbols,params,
    stopLossPct:(+document.getElementById("sStop").value||3)/100,
    takeProfitPct:(+document.getElementById("sTake").value||6)/100,
    maxPositionSize:+document.getElementById("sMax").value||5000, enabled:true});
  log("system",`Strategy created: ${name}`); save(); renderStrategies();
}
function toggleStrat(id){ const s=state.strategies.find(x=>x.id===id); s.enabled=!s.enabled; save(); render(); }
function delStrat(id){ if(!confirm("Delete strategy?"))return; state.strategies=state.strategies.filter(s=>s.id!==id); save(); renderStrategies(); }
function runBT(id){ const s=state.strategies.find(x=>x.id===id);
  const r=backtest(s.kind,s.params,s.symbols[0],365,s.stopLossPct,s.takeProfitPct); r.strategyId=id;
  state.backtests=state.backtests.filter(b=>b.strategyId!==id); state.backtests.push(r);
  log("system",`Backtest ${s.name} (${s.symbols[0]}): return ${pct(r.ret)}, ${r.trades} trades`); save(); renderStrategies();
}

function renderPortfolio(){
  document.getElementById("portfolio").innerHTML=`
    <h1>Portfolio</h1>
    <div class="grid g4" style="margin-bottom:14px">
      ${statCard("Equity",usd(state.equity))}${statCard("Cash",usd(state.cash))}
      ${statCard("Unrealized P/L",usd(state.positions.reduce((s,p)=>s+(p.upnl||0),0)),"",pcls(state.positions.reduce((s,p)=>s+(p.upnl||0),0)))}
      ${statCard("Positions",state.positions.length)}
    </div>
    <div class="card" style="padding:0;overflow:hidden">${state.positions.length===0?'<div class="empty">No open positions. Start the engine and add a strategy.</div>':`
      <table><thead><tr><th>Symbol</th><th>Qty</th><th>Avg</th><th>Price</th><th>Value</th><th>Unreal. P/L</th><th>Stop</th><th>Target</th></tr></thead><tbody>
      ${state.positions.map(p=>`<tr><td><b>${p.symbol}</b></td><td>${fmtq(p.qty)}</td><td>${usd(p.avg)}</td><td>${usd(p.price)}</td><td>${usd(p.value)}</td><td class="${pcls(p.upnl)}">${usd(p.upnl)}</td><td>${usd(p.stop)}</td><td>${usd(p.take)}</td></tr>`).join("")}
      </tbody></table>`}</div>`;
}

function renderHistory(){
  document.getElementById("history").innerHTML=`
    <h1>Trade History</h1>
    <div class="card" style="padding:0;overflow:hidden">${state.trades.length===0?'<div class="empty">No trades yet.</div>':`
      <table><thead><tr><th>Time</th><th>Symbol</th><th>Side</th><th>Qty</th><th>Price</th><th>P/L</th></tr></thead><tbody>
      ${state.trades.slice(0,100).map(t=>`<tr><td class="muted">${ago(t.t)}</td><td><b>${t.symbol}</b></td><td><span class="badge ${t.side==='buy'?'b-pos':'b-neg'}">${t.side}</span></td><td>${fmtq(t.qty)}</td><td>${usd(t.price)}</td><td class="${pcls(t.pnl)}">${t.pnl!=null?usd(t.pnl):'—'}</td></tr>`).join("")}
      </tbody></table>`}</div>`;
}

function renderRisk(){
  const r=state.risk;
  document.getElementById("risk").innerHTML=`
    <h1>Risk Controls</h1>
    <div class="grid g2">
      <div class="card"><div class="row" style="justify-content:space-between"><b>Kill Switch</b><span class="badge ${r.killSwitch?'b-neg':'b-pos'}">${r.killSwitch?'ENGAGED':'Clear'}</span></div>
        <p class="muted" style="font-size:13px">Halts the engine and (on emergency stop) flattens positions. No trading while engaged.</p>
        ${r.killSwitch?'<button class="btn-success" onclick="disengage()">Disengage kill switch</button>':'<button class="btn-danger" onclick="emergencyStop()">Emergency stop</button>'}</div>
      <div class="card"><div class="row" style="justify-content:space-between"><b>Live Trading</b><span class="badge b-pos">Disabled (safe)</span></div>
        <p class="muted" style="font-size:13px">This standalone build is paper-only by design — it never connects to a broker or moves real money.</p></div>
    </div>
    <div class="card" style="margin-top:14px"><h3>Limits</h3><div class="grid" style="grid-template-columns:1fr 1fr 1fr 1fr">
      <label class="field"><span>Risk per trade %</span><input id="rPer" type="number" step="0.1" value="${(r.perTradePct*100).toFixed(1)}"></label>
      <label class="field"><span>Daily loss limit %</span><input id="rDaily" type="number" step="0.1" value="${(r.dailyLossPct*100).toFixed(1)}"></label>
      <label class="field"><span>Max open positions</span><input id="rPos" type="number" value="${r.maxPositions}"></label>
      <label class="field"><span>Max trades / day</span><input id="rTr" type="number" value="${r.maxTradesPerDay}"></label>
    </div><button class="btn-primary" onclick="saveRisk()">Save limits</button>
    <button class="btn-ghost" onclick="resetAll()" style="margin-left:8px">Reset paper account</button></div>`;
}
function saveRisk(){ state.risk.perTradePct=(+document.getElementById("rPer").value||1)/100;
  state.risk.dailyLossPct=(+document.getElementById("rDaily").value||3)/100;
  state.risk.maxPositions=+document.getElementById("rPos").value||8;
  state.risk.maxTradesPerDay=+document.getElementById("rTr").value||8; log("risk","Risk limits updated"); save(); render(); }
function disengage(){ state.risk.killSwitch=false; log("system","Kill switch disengaged"); save(); render(); }
function resetAll(){ if(!confirm("Reset the paper account? Clears all positions, trades, strategies and logs."))return;
  stopEngine(); const theme=state.theme; state=freshState(); state.theme=theme; save(); render(); }

function renderLogs(){
  const cats=["all","signal","order","rejection","risk","system"]; window._logCat=window._logCat||"all";
  const rows=state.logs.filter(l=>window._logCat==="all"||l.cat===window._logCat);
  document.getElementById("logs").innerHTML=`<h1>Logs</h1>
    <div class="row" style="margin-bottom:12px">${cats.map(c=>`<button class="pill ${window._logCat===c?'active':''}" onclick="setLogCat('${c}')">${c}</button>`).join("")}</div>
    <div class="card" style="padding:0;max-height:70vh;overflow:auto">${rows.length===0?'<div class="empty">No log entries.</div>':rows.map(l=>`<div style="display:flex;gap:10px;padding:9px 12px;border-bottom:1px solid var(--border);font-size:13px"><span class="badge b-default">${l.cat}</span><div><div>${l.msg}</div><div class="muted" style="font-size:11px">${new Date(l.t).toLocaleString()}</div></div></div>`).join("")}</div>`;
}
function setLogCat(c){ window._logCat=c; renderLogs(); }

//============================ Wiring ============================
document.getElementById("startBtn").onclick=()=>engineRunning?stopEngine():startEngine();
document.getElementById("stopAll").onclick=emergencyStop;
document.getElementById("themeBtn").onclick=()=>{ state.theme=state.theme==="dark"?"light":"dark"; applyTheme(); save(); };
function applyTheme(){ document.body.className=state.theme==="light"?"light":""; }
window.go=go;window.addStrategy=addStrategy;window.toggleStrat=toggleStrat;window.delStrat=delStrat;window.runBT=runBT;
window.presetParams=presetParams;window.saveRisk=saveRisk;window.disengage=disengage;window.emergencyStop=emergencyStop;
window.resetAll=resetAll;window.setLogCat=setLogCat;

applyTheme(); renderNav(); render();
// seed a default strategy on first run so there's something to watch
if(state.strategies.length===0){
  state.strategies.push({id:"s_default",name:"BTC Mean Reversion",kind:"mean_reversion",symbols:["BTC-USD","ETH-USD"],
    params:{period:20,bands:1.5},stopLossPct:0.04,takeProfitPct:0.08,maxPositionSize:8000,enabled:true});
  log("system","Welcome! A sample strategy was added. Click ▶ Start to run the engine."); save(); render();
}
</script>
</body>
</html>
