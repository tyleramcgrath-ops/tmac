<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 — Envue Mex</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body{display:grid;place-items:center;min-height:100vh;background:
      radial-gradient(900px 500px at 50% 0%, rgba(138,92,246,.35), transparent 60%),
      linear-gradient(180deg, #0B0712, #1A0E36);color:#fff;text-align:center;padding:24px}
    .e{font-family:"Sora",sans-serif;font-size:clamp(4rem,12vw,8rem);font-weight:800;background:linear-gradient(135deg,#C9A4FF,#fff,#8A5CF6);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1;margin:0}
    .e + p{color:rgba(255,255,255,.7);max-width:480px;margin:14px auto 24px}
  </style>
</head>
<body>
  <div>
    <p class="e">404</p>
    <h1 style="margin:0;color:#fff;font-size:1.5rem">Ruta no encontrada / Route not found</h1>
    <p>La página que buscas se salió del mapa. / The page you're looking for went off the map.</p>
    <a class="btn btn--primary btn--lg" href="/">← Volver al inicio</a>
  </div>
</body>
</html>
